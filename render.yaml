services:
  - type: web
    name: lifestream-exchange
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.index:app_handle
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blood_exchange_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: blood_exchange_db
    plan: free
